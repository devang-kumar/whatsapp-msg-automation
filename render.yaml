services:
  - type: web
    name: whatsapp-bulk-messenger
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn -w 1 --threads 8 -b 0.0.0.0:$PORT app:app
    plan: free
    envVars:
      - key: HEADLESS
        value: "1"
      - key: USE_WEBDRIVER_MANAGER
        value: "0"
      - key: CHROME_BINARY
        value: /usr/bin/chromium
      - key: CHROMEDRIVER_PATH
        value: /usr/bin/chromedriver
      - key: CHROME_USER_DATA_DIR
        value: /tmp/wa_profile
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: wa-profile
      mountPath: /data/wa_profile
      sizeGB: 1
